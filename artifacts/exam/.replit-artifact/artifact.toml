kind = "web"
previewPath = "/"
title = "Online Assessment"
version = "1.0.0"
id = "artifacts/exam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21949

[services.development]
run = "pnpm --filter @workspace/exam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam", "run", "build" ]
publicDir = "artifacts/exam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21949"
BASE_PATH = "/"
